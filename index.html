<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Grade - Vôlei</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="lobby-container">
        <h2>📍 Onde você vai jogar hoje?</h2>
        <p style="text-align: center; color: #888; margin-bottom: 30px;">Selecione o parque para acessar a grade isolada.</p>
        
        <div class="lobby-grid">
            <button class="btn-lobby" onclick="selectLocal('ramiro')">🌳 Parque Ramiro Ruediger</button>
            <button class="btn-lobby" onclick="selectLocal('artex')">🏭 Artex (Garcia)</button>
            <button class="btn-lobby" onclick="selectLocal('itoupavas')">🏞️ Parque das Itoupavas</button>
            <button class="btn-lobby" onclick="selectLocal('aguaverde')">🚌 Terminal Água Verde</button>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        
        <div class="top-bar">
            <button onclick="backToLobby()" class="btn-back">⬅️ Voltar</button>
            <span id="connectionStatus" class="status-indicator">🟢 Online</span>
            <button id="loginBtn" class="btn-login">Área Admin</button>
        </div>

        <h2>🏐 Grade - <span id="parkNameDisplay">Local</span></h2>

        <div class="identity-bar">
            <div id="user-logged-out" style="width: 100%;">
                <button onclick="loginGoogle()" class="btn-identify" style="width: 100%; padding: 12px;">
                    🔑 Fazer Login com Google para Jogar
                </button>
            </div>

            <div id="user-logged-in" style="display: none; width: 100%; justify-content: space-between; align-items: center;">
                <div class="identity-info" style="display: flex; align-items: center; gap: 10px;">
                    <span>👤 Jogador:</span>
                    <strong id="playerNameDisplay">Carregando...</strong>
                    <button onclick="definirNovoApelido()" style="background: none; border: 1px solid #3498db; color: #3498db; padding: 2px 6px; border-radius: 4px; font-size: 10px; cursor: pointer;">
                        Alterar Apelido
                    </button>
                </div>
                <button onclick="logout()" style="background: none; border: 1px solid #ff4757; color: #ff4757; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold;">
                    Sair
                </button>
            </div>
        </div>

        <div id="scorekeeperBanner" class="scorekeeper-banner scorekeeper-only-block">
            🏐 Você é o próximo! O controle do placar está com você.
        </div>

        <div class="card">
            <div class="court-header">
                <h3>Dentro de Quadra</h3>
                <button id="resetScoreBtn" class="btn-reset-score admin-only">Zerar Placar</button>
            </div>
            <ul id="courtList"></ul>
        </div>

        <div class="card">
            <h3>Fila de Espera</h3>
            <ul id="queueList"></ul>
        </div>

        <div class="card">
            <h3>Entrar na Grade</h3>
            
            <div class="input-group" id="addPlayerGroup">
                <input type="text" id="newPlayer" placeholder="Nome do jogador">
                <button class="btn-add" id="addBtn">Adicionar</button>
            </div>
            
            <button id="quickJoinBtn" class="btn-add" style="display: none; width: 100%; background: #3498db; font-size: 16px; padding: 15px; border-radius: 8px;">
                👉 Entrar na Fila
            </button>
        </div>

        <div class="card admin-only-block">
            <h3 style="border: none;">Gerenciamento Restrito</h3>
            <button id="resetBtn" class="btn-reset">Zerar Grade Deste Parque</button>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <script src="script.js"></script>

</body>
</html>
