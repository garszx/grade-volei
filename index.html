<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Grade - Vôlei</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="lobby-container">
        <h2>📍 Onde você vai jogar hoje?</h2>
        <p style="text-align: center; color: #888; margin-bottom: 30px;">Selecione o parque para acessar a grade isolada.</p>
        
        <div class="lobby-grid">
            <button class="btn-lobby" onclick="selectLocal('ramiro')">🌳 Parque Ramiro Ruediger</button>
            <button class="btn-lobby" onclick="selectLocal('artex')">🏭 Artex (Garcia)</button>
            <button class="btn-lobby" onclick="selectLocal('itoupavas')">🏞️ Parque das Itoupavas</button>
            <button class="btn-lobby" onclick="selectLocal('aguaverde')">🚌 Terminal Água Verde</button>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        
        <div class="top-bar">
            <button onclick="backToLobby()" class="btn-back">⬅️ Voltar</button>
            <span id="connectionStatus" class="status-indicator">🟢 Online</span>
            <button id="loginBtn" class="btn-login">Área Admin</button>
        </div>

        <h2>🏐 Grade - <span id="parkNameDisplay">Local</span></h2>

        <div class="identity-bar">
            <div class="identity-info">
                <span>👤 Aparelho vinculado a:</span>
                <strong id="playerNameDisplay">Ninguém</strong>
            </div>
            <div style="display: flex; gap: 8px;">
                <button id="identifyBtn" class="btn-identify">Sou Eu</button>
                <button id="editIdentityBtn" class="btn-edit-identity" style="display: none;">Corrigir</button>
            </div>
        </div>

        <div id="scorekeeperBanner" class="scorekeeper-banner scorekeeper-only-block">
            🏐 Você é o próximo! O controle do placar está com você.
        </div>

        <div class="card">
            <div class="court-header">
                <h3>Dentro de Quadra</h3>
                <button id="resetScoreBtn" class="btn-reset-score admin-only">Zerar Placar</button>
            </div>
            <ul id="courtList"></ul>
        </div>

        <div class="card">
            <h3>Fila de Espera</h3>
            <ul id="queueList"></ul>
        </div>

        <div class="card">
            <h3>Adicionar Jogador</h3>
            <div class="input-group">
                <input type="text" id="newPlayer" placeholder="Nome do jogador">
                <button class="btn-add" id="addBtn">Adicionar</button>
            </div>
        </div>

        <div class="card admin-only-block">
            <h3 style="border: none;">Gerenciamento Restrito</h3>
            <button class="btn-reset" id="resetBtn">Zerar Grade Deste Parque</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
